<!DOCTYPE html>
<html lang="id" data-theme="default">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Monitoring Survei — BPS Kep. Bangka Belitung</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#eef2f7;--surface:#fff;--surface2:#f6f8fb;--surface3:#e8edf5;
  --header:#1a3558;--header-text:#fff;--header-sub:#7eb3f5;
  --accent:#2060d0;--accent-dark:#1a3558;--accent-soft:rgba(32,96,208,0.1);
  --text:#0d1b2e;--muted:#4a6080;--light:#8fa4bf;
  --border:#dde4ef;--border2:#c8d4e4;
  --shadow:0 1px 4px rgba(0,0,0,0.07);--shadow-md:0 4px 18px rgba(0,0,0,0.11);--shadow-lg:0 16px 48px rgba(0,0,0,0.15);
  --font:'DM Sans',system-ui,sans-serif;--fs:14px;--r:14px;
  --g:#16a34a;--gbg:#dcfce7;--red:#dc2626;--rbg:#fee2e2;--amb:#d97706;--abbg:#fef3c7;
}
[data-theme="dark"]{--bg:#090e1a;--surface:#111827;--surface2:#161f30;--surface3:#1c2840;--header:#060c18;--header-sub:#5a9cf5;--text:#e8f0ff;--muted:#7a94b8;--light:#3a5070;--border:#1e2e45;--border2:#2a3f60;--accent-soft:rgba(32,96,208,0.18);}
[data-theme="teal"]{--bg:#effaf8;--surface:#fff;--surface2:#effaf8;--surface3:#c8f0e8;--header:#0a4438;--header-sub:#5ee4c0;--accent:#0c8c6e;--accent-dark:#0a4438;--accent-soft:rgba(12,140,110,0.1);--text:#042e26;--muted:#0a5c48;--border:#a0e8d4;}
[data-theme="slate"]{--bg:#f0f4f8;--surface:#fff;--surface2:#e8edf4;--surface3:#dde4ee;--header:#1c2637;--header-sub:#8fa8c8;--accent:#3a5a80;--accent-dark:#1c2637;--accent-soft:rgba(58,90,128,0.1);--text:#0a1628;--muted:#3a5070;--border:#c8d8e8;}
[data-theme="warm"]{--bg:#fdf6ec;--surface:#fff;--surface2:#fdf6ec;--surface3:#fae8cc;--header:#6e2e04;--header-sub:#f5bb60;--accent:#c06010;--accent-dark:#6e2e04;--accent-soft:rgba(192,96,16,0.1);--text:#2e1200;--muted:#7a3e10;--border:#f0d0a0;}
[data-theme="rose"]{--bg:#fff0f2;--surface:#fff;--surface2:#fff0f2;--surface3:#ffd8de;--header:#7a0e28;--header-sub:#f87090;--accent:#c01840;--accent-dark:#7a0e28;--accent-soft:rgba(192,24,64,0.1);--text:#280008;--muted:#800830;--border:#f0b0c0;}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);font-size:var(--fs);background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;}

header{background:var(--header);padding:15px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;border-bottom:1px solid rgba(255,255,255,0.06);}
.hbrand{display:flex;align-items:center;gap:12px;}
.hicon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),#1848b8);border-radius:10px;display:grid;place-items:center;font-size:19px;flex-shrink:0;}
.hsub{color:var(--header-sub);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:monospace;}
.htitle{color:var(--header-text);font-size:17px;font-weight:700;font-family:'DM Serif Display',serif;}
.hright{display:flex;align-items:center;gap:8px;}
#dot{width:8px;height:8px;border-radius:50%;background:#3a5070;transition:background .3s;flex-shrink:0;}
#dot.ok{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,0.25);}
#dot.loading{background:#f59e0b;animation:blink 1s infinite;}
#dot.err{background:#ef4444;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#upd{color:rgba(255,255,255,0.3);font-size:11px;font-family:monospace;}
.hbtn{background:rgba(255,255,255,0.1);color:var(--header-text);border:none;border-radius:8px;padding:7px 11px;cursor:pointer;font-size:15px;transition:background .2s;}
.hbtn:hover{background:rgba(255,255,255,0.2);}

.wrap{max-width:1040px;margin:0 auto;padding:24px 20px;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat{background:var(--surface);border-radius:var(--r);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);position:relative;overflow:hidden;}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sc,var(--accent));}
.sv{font-size:30px;font-weight:700;font-family:'DM Serif Display',serif;line-height:1.1;margin-bottom:4px;}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;font-weight:600;}

/* TOOLBAR */
.tb{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.srch{flex:1;min-width:190px;position:relative;}
.srch input{width:100%;padding:9px 14px 9px 34px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:all .2s;}
.srch input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
.srch-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--light);pointer-events:none;}
.ftrs{display:flex;gap:6px;flex-wrap:wrap;}
.fb{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:12px;cursor:pointer;background:var(--surface);color:var(--muted);font-family:var(--font);font-weight:500;transition:all .2s;}
.fb.on{background:var(--accent-dark);color:#fff;border-color:var(--accent-dark);font-weight:700;}
.rfbtn{padding:8px 13px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--font);font-weight:600;transition:all .2s;}
.rfbtn:hover{border-color:var(--accent);color:var(--accent);}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:14px;}
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border);border-left:4px solid #ccc;overflow:hidden;transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.cmain{padding:20px 22px;}
.ctop{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px;}
.cinfo{flex:1;}
.cname{font-size:16px;font-weight:700;font-family:'DM Serif Display',serif;color:var(--text);margin-bottom:7px;}
.cmeta{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.badge{border-radius:20px;padding:3px 11px;font-size:11px;font-weight:700;}
.dl{font-size:11px;color:var(--muted);}
.dl.red{color:var(--red);font-weight:700;}
.cpct{font-size:30px;font-weight:700;font-family:'DM Serif Display',serif;line-height:1;text-align:right;min-width:60px;}
.pb{background:var(--surface3);border-radius:99px;height:8px;overflow:hidden;}
.pf{height:100%;border-radius:99px;transition:width .6s ease;}
.team{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:10px;}
.tlbl{font-size:10px;color:var(--light);text-transform:uppercase;letter-spacing:.5px;}
.tbdg{background:var(--surface2);color:var(--accent-dark);border:1px solid var(--border);border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;}

/* KAB ACCORDION */
.kabacc{border-top:1px solid var(--border);background:var(--surface2);}
.kabtog{width:100%;padding:10px 22px;background:none;border:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:7px;transition:background .2s;}
.kabtog:hover{background:var(--surface3);}
.kabwrap{display:none;padding:0 22px 20px;}
.kabwrap.open{display:block;}
.kabgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px;}
.kabitem{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;cursor:pointer;transition:all .2s;}
.kabitem:hover{border-color:var(--accent);box-shadow:0 3px 12px var(--accent-soft);transform:translateY(-1px);}
.kihead{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.kiname{font-size:12px;font-weight:700;}
.kipct{font-size:15px;font-weight:700;font-family:'DM Serif Display',serif;}
.kibar{background:var(--surface3);border-radius:99px;height:5px;overflow:hidden;margin-bottom:5px;}
.kifill{height:100%;border-radius:99px;}
.kihint{font-size:10px;color:var(--light);}

.nodata{text-align:center;padding:60px 20px;color:var(--light);background:var(--surface);border-radius:var(--r);border:1px solid var(--border);}
.nodata .ico{font-size:36px;margin-bottom:12px;}

/* KAB PANEL */
#kOv{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;display:none;backdrop-filter:blur(4px);}
#kOv.on{display:block;}
#kPan{position:fixed;right:0;top:0;bottom:0;width:500px;background:var(--surface);box-shadow:var(--shadow-lg);z-index:301;transform:translateX(110%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;border-left:1px solid var(--border);}
#kPan.on{transform:translateX(0);}
.kph{padding:20px 22px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);}
.kptop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.kpsurvei{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;}
.kpkab{font-size:22px;font-weight:700;font-family:'DM Serif Display',serif;color:var(--text);}
.kxbtn{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;font-size:13px;color:var(--muted);}
.kpprog{display:flex;align-items:center;gap:10px;margin-top:8px;}
.kpbar{flex:1;background:var(--surface3);border-radius:99px;height:9px;overflow:hidden;}
.kpfill{height:100%;border-radius:99px;transition:width .5s;}
.kppct{font-size:16px;font-weight:700;font-family:'DM Serif Display',serif;min-width:44px;text-align:right;}
.kstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 22px;border-bottom:1px solid var(--border);flex-shrink:0;}
.kstat{background:var(--surface2);border-radius:9px;padding:10px;text-align:center;border:1px solid var(--border);}
.ksv{font-size:22px;font-weight:700;font-family:'DM Serif Display',serif;}
.ksl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.ksbar{padding:12px 22px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;}
.ksrch{flex:1;min-width:120px;padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-family:var(--font);outline:none;}
.ksrch:focus{border-color:var(--accent);}
.kfbtns{display:flex;gap:5px;}
.kfb{padding:7px 11px;border-radius:18px;border:1.5px solid var(--border);font-size:11px;cursor:pointer;background:var(--surface);color:var(--muted);font-family:var(--font);font-weight:600;}
.kfb.on{background:var(--accent-dark);color:#fff;border-color:var(--accent-dark);}
.kbody{flex:1;overflow-y:auto;padding:14px 22px;}
.sitem{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;background:var(--surface);}
.sitem.sudah{border-left:3px solid var(--g);}
.sitem.belum{border-left:3px solid var(--border2);}
.sdot{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:13px;font-weight:700;margin-top:1px;}
.sdot.sudah{background:var(--gbg);color:var(--g);}
.sdot.belum{background:var(--surface3);color:var(--light);}
.sbody{flex:1;min-width:0;}
.srow{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:3px;}
.sname{font-size:13px;font-weight:700;}
.sid{font-size:10px;color:var(--light);font-family:monospace;background:var(--surface2);padding:1px 6px;border-radius:4px;margin-left:5px;}
.sbdg{font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;flex-shrink:0;}
.sbdg.sudah{background:var(--gbg);color:var(--g);}
.sbdg.belum{background:var(--surface3);color:var(--muted);}
.smeta{font-size:11px;color:var(--muted);}
.snote{font-size:11px;color:var(--light);font-style:italic;margin-top:2px;}
.kempty{text-align:center;padding:40px 20px;color:var(--light);}
.kempty .ei{font-size:32px;margin-bottom:10px;}

/* SETTINGS */
.sov{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;}
.sov.on{display:block;}
.span{position:fixed;right:0;top:0;bottom:0;width:320px;background:var(--surface);z-index:201;transform:translateX(100%);transition:transform .3s;overflow-y:auto;border-left:1px solid var(--border);box-shadow:var(--shadow-lg);}
.span.on{transform:translateX(0);}
.sph{padding:18px 20px;background:var(--accent-dark);color:#fff;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;}
.sph h2{font-size:15px;font-weight:700;}
.bx{background:rgba(255,255,255,0.15);border:none;color:#fff;width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px;}
.spb{padding:18px 20px;}
.ss{margin-bottom:22px;}
.ss h3{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:5px;}
.tgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;}
.tbtn{padding:10px 6px;border-radius:9px;border:2px solid var(--border);cursor:pointer;font-size:11px;font-weight:700;font-family:var(--font);text-align:center;transition:all .2s;}
.tbtn.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
.fzrow{display:flex;align-items:center;gap:9px;}
.fzrow input[type=range]{flex:1;accent-color:var(--accent);}
.fzv{font-size:12px;font-weight:700;min-width:32px;color:var(--muted);text-align:right;}

@media(max-width:640px){
  .stats{grid-template-columns:repeat(2,1fr);}
  .kabgrid{grid-template-columns:1fr;}
  header{padding:12px 16px;flex-wrap:wrap;gap:8px;}
  #kPan{width:100%;}
  .span{width:100%;}
  .wrap{padding:16px 14px;}
}
</style>
</head>
<body>

<header>
  <div class="hbrand">
    <div class="hicon">📊</div>
    <div>
      <div class="hsub">Badan Pusat Statistik — Kep. Bangka Belitung</div>
      <div class="htitle">Dashboard Monitoring Survei</div>
    </div>
  </div>
  <div class="hright">
    <div id="dot" class="loading"></div>
    <span id="upd">Memuat...</span>
    <button class="hbtn" onclick="loadAll()" title="Refresh">🔄</button>
    <button class="hbtn" onclick="openSP()">⚙️</button>
  </div>
</header>

<div class="wrap">
  <div class="stats">
    <div class="stat" style="--sc:var(--accent)"><div class="sv" id="stT">—</div><div class="sl">Total Survei</div></div>
    <div class="stat" style="--sc:#3b82f6"><div class="sv" id="stB">—</div><div class="sl">Sedang Berjalan</div></div>
    <div class="stat" style="--sc:var(--g)"><div class="sv" id="stS">—</div><div class="sl">Selesai</div></div>
    <div class="stat" style="--sc:var(--amb)"><div class="sv" id="stP">—</div><div class="sl">Rata-rata Progress</div></div>
  </div>
  <div class="tb">
    <div class="srch">
      <span class="srch-ic">🔍</span>
      <input type="text" id="srch" placeholder="Cari nama survei..." oninput="renderCards()">
    </div>
    <div class="ftrs" id="ftrs">
      <button class="fb on" data-f="Semua">Semua</button>
      <button class="fb" data-f="Belum Mulai">Belum Mulai</button>
      <button class="fb" data-f="Sedang Berjalan">Berjalan</button>
      <button class="fb" data-f="Review">Review</button>
      <button class="fb" data-f="Selesai">Selesai</button>
    </div>
    <button class="rfbtn" onclick="loadAll()">🔄 Refresh</button>
  </div>
  <div class="cards" id="cards">
    <div class="nodata"><div class="ico">⏳</div><div>Memuat data...</div></div>
  </div>
</div>

<!-- KAB PANEL -->
<div id="kOv" onclick="closeKP()"></div>
<div id="kPan">
  <div class="kph">
    <div class="kptop">
      <div>
        <div class="kpsurvei" id="kpS">—</div>
        <div class="kpkab" id="kpK">—</div>
      </div>
      <button class="kxbtn" onclick="closeKP()">✕</button>
    </div>
    <div class="kpprog">
      <div class="kpbar"><div class="kpfill" id="kpF" style="width:0%"></div></div>
      <div class="kppct" id="kpP">0%</div>
    </div>
  </div>
  <div class="kstats">
    <div class="kstat"><div class="ksv" id="kpTot" style="color:var(--accent-dark)">0</div><div class="ksl">Total</div></div>
    <div class="kstat"><div class="ksv" id="kpSdh" style="color:var(--g)">0</div><div class="ksl">Sudah Masuk</div></div>
    <div class="kstat"><div class="ksv" id="kpBlm" style="color:var(--red)">0</div><div class="ksl">Belum Masuk</div></div>
  </div>
  <div class="ksbar">
    <input class="ksrch" id="ksrch" placeholder="🔍 Cari sampel..." oninput="renderSampel()">
    <div class="kfbtns">
      <button class="kfb on" data-sf="Semua" onclick="setSF('Semua',this)">Semua</button>
      <button class="kfb" data-sf="Sudah" onclick="setSF('Sudah',this)">✅ Sudah</button>
      <button class="kfb" data-sf="Belum" onclick="setSF('Belum',this)">⏳ Belum</button>
    </div>
  </div>
  <div class="kbody" id="kbody"></div>
</div>

<!-- SETTINGS -->
<div class="sov" id="sov" onclick="closeSP()"></div>
<div class="span" id="span">
  <div class="sph"><h2>⚙️ Tampilan</h2><button class="bx" onclick="closeSP()">✕</button></div>
  <div class="spb">
    <div class="ss">
      <h3>🎨 Tema</h3>
      <div class="tgrid">
        <button class="tbtn on" style="background:#1a3558;color:#fff" onclick="setTheme('default',this)">🔵 BPS Biru</button>
        <button class="tbtn" style="background:#090e1a;color:#e8f0ff" onclick="setTheme('dark',this)">🌙 Gelap</button>
        <button class="tbtn" style="background:#0a4438;color:#fff" onclick="setTheme('teal',this)">🌿 Teal</button>
        <button class="tbtn" style="background:#1c2637;color:#8fa8c8" onclick="setTheme('slate',this)">🩶 Slate</button>
        <button class="tbtn" style="background:#6e2e04;color:#f5bb60" onclick="setTheme('warm',this)">🍂 Warm</button>
        <button class="tbtn" style="background:#7a0e28;color:#f87090" onclick="setTheme('rose',this)">🌹 Rose</button>
      </div>
    </div>
    <div class="ss">
      <h3>📏 Ukuran Teks</h3>
      <div class="fzrow">
        <span style="font-size:11px">A</span>
        <input type="range" min="12" max="18" value="14" oninput="setFZ(this.value)">
        <span style="font-size:16px">A</span>
        <span class="fzv" id="fzv">14px</span>
      </div>
    </div>
  </div>
</div>

<script>
// ================================================================
//  ✏️  EDIT BAGIAN INI SAJA
//  Ganti dengan Spreadsheet ID Google Sheets kamu
//  Cara dapat ID: buka Google Sheets → lihat URL:
//  docs.google.com/spreadsheets/d/[ INI ID-NYA ]/edit
// ================================================================
const SHEET_ID = "1iLGJug5pltCIcP0YBdRX1VqxjuxvdJAu49bSwnnBN7k";
// ================================================================

const KABKOTA=["Pangkalpinang","Kab. Bangka","Kab. Bangka Barat","Kab. Bangka Tengah","Kab. Bangka Selatan","Kab. Belitung","Kab. Belitung Timur"];
const SCFG={"Belum Mulai":{c:"#64748b",bg:"rgba(100,116,139,0.1)",d:"#94a3b8"},"Sedang Berjalan":{c:"#2060d0",bg:"rgba(32,96,208,0.1)",d:"#3b82f6"},"Review":{c:"#d97706",bg:"rgba(217,119,6,0.1)",d:"#f59e0b"},"Selesai":{c:"#16a34a",bg:"rgba(22,163,74,0.1)",d:"#22c55e"}};

let surveiData=[],sampelData=[],flt="Semua",kpSurvei=null,kpKab=null,kpItems=[],sflt="Semua",isDemoSampel=false;

// ── DEMO DATA: dipakai saat sheet "Sampel" belum diisi atau gagal dimuat ──
const NAMA_DEMO=["Ahmad Fauzi","Budi Santoso","Citra Dewi","Deni Kurniawan","Eka Putri","Fajar Rahman","Gita Lestari","Hendra Wijaya","Indah Sari","Joko Prabowo","Kartini Bahar","Lutfi Hakim","Maya Anggraini","Nurul Hidayat","Oky Setiawan","Putri Handayani","Rizky Maulana","Siti Rahayu","Teguh Santosa","Umar Bakri"];
const ALAMAT_DEMO={
  "Pangkalpinang":["Jl. Sudirman","Jl. Ahmad Yani","Jl. Soekarno Hatta","Jl. Depati Amir","Jl. Mentok"],
  "Kab. Bangka":["Jl. Koba Raya","Jl. Sungailiat","Jl. Belinyu","Jl. Riau","Jl. Pasar Lama"],
  "Kab. Bangka Barat":["Jl. Muntok Raya","Jl. Parit Tiga","Jl. Tempilang","Jl. Kelapa","Jl. Jebus"],
  "Kab. Bangka Tengah":["Jl. Koba","Jl. Lubuk Besar","Jl. Pangkalan Baru","Jl. Simpang Katis","Jl. Merdeka"],
  "Kab. Bangka Selatan":["Jl. Toboali","Jl. Air Gegas","Jl. Lepar","Jl. Simpang Rimba","Jl. Payung"],
  "Kab. Belitung":["Jl. Tanjungpandan","Jl. Sijuk","Jl. Membalong","Jl. Badau","Jl. Selat Nasik"],
  "Kab. Belitung Timur":["Jl. Manggar","Jl. Gantung","Jl. Damar","Jl. Simpang Pesak","Jl. Kelapa Kampit"],
};

function generateDemoSampel(surveiArr){
  const TOTAL_PER_KAB=10;
  const out=[];
  surveiArr.forEach(survei=>{
    KABKOTA.forEach(kab=>{
      const pct=survei.kab[kab]??0;
      const sudahCount=Math.round(TOTAL_PER_KAB*pct/100);
      const alamatList=ALAMAT_DEMO[kab]||["Jl. Utama"];
      for(let i=0;i<TOTAL_PER_KAB;i++){
        out.push({
          id:`demo_${survei.id}_${kab}_${i}`,
          survei:survei.nama,
          kab,
          idSampel:`S${String(i+1).padStart(3,"0")}`,
          nama:NAMA_DEMO[i%NAMA_DEMO.length],
          alamat:`${alamatList[i%alamatList.length]} No.${i*3+1}, ${kab}`,
          status:i<sudahCount?"Sudah":"Belum",
          catatan:i<sudahCount&&i%3===0?"Sudah dikonfirmasi petugas":"",
        });
      }
    });
  });
  return out;
}

// Cek apakah ID sudah diisi
window.addEventListener("load",()=>{
  if(SHEET_ID==="GANTI_DENGAN_SPREADSHEET_ID_KAMU"){
    document.getElementById("cards").innerHTML=`<div class="nodata">
      <div class="ico">✏️</div>
      <div><strong>Konfigurasi diperlukan</strong><br><br>
      Buka file HTML ini dengan text editor,<br>cari baris <code style="background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:12px">const SHEET_ID = "1iLGJug5pltCIcP0YBdRX1VqxjuxvdJAu49bSwnnBN7k"</code><br>
      lalu ganti dengan Spreadsheet ID Google Sheets kamu.</div>
    </div>`;

    document.getElementById("upd").textContent="Belum dikonfigurasi";

  }
  loadAll();

// Ambil data pakai Google Visualization API (tidak kena CORS)
async function gviz(sheetName){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
  const r=await fetch(url);
  if(!r.ok)throw new Error("HTTP "+r.status);
  const txt=await r.text();
  const parsed=JSON.parse(txt.replace(/^[^(]+\(/,"").replace(/\);?\s*$/,""));
  // Deteksi error dari Google API (sheet tidak ada / akses ditolak)
  if(parsed.status==="error"||!parsed.table){
    const msg=parsed.errors?.[0]?.detailed_message||parsed.errors?.[0]?.message||`Sheet "${sheetName}" tidak ditemukan atau tidak bisa diakses`;
    throw new Error(msg);
  }
  return parsed;
}

function toRows(resp){
  if(!resp.table?.cols)return[];
  const cols=resp.table.cols.map(c=>c.label||c.id);
  return(resp.table.rows||[]).map(row=>{
    const o={};
    cols.forEach((c,i)=>{const cell=row.c?.[i];o[c]=cell?(cell.v!=null?cell.v:""):"";});
    return o;
  });
}

async function loadAll(){
  if(SHEET_ID==="GANTI_DENGAN_SPREADSHEET_ID_KAMU")return;
  setDot("loading");
  try{
    const [sr,spr]=await Promise.allSettled([gviz("Survei"),gviz("Sampel")]);
    if(sr.status==="fulfilled"){
      surveiData=toRows(sr.value).map((r,i)=>({
        id:String(i),
        nama:String(r["Nama Survei"]||"").trim(),
        deadline:String(r["Deadline"]||""),
        status:(s=>["Belum Mulai","Sedang Berjalan","Review","Selesai"].includes(s)?s:"Belum Mulai")(String(r["Status"]||"").trim()),
        progress:Math.min(100,Math.max(0,parseInt(r["Progress (%)"])||0)),
        penanggung:String(r["Penanggung Jawab"]||"").split(",").map(s=>s.trim()).filter(Boolean),
        kab:Object.fromEntries(KABKOTA.map(k=>[k,Math.min(100,Math.max(0,parseInt(r[k])||0))])),
      })).filter(d=>d.nama);
    } else throw new Error("Gagal baca sheet 'Survei'. Pastikan nama sheet tepat dan sharing sudah diaktifkan.");

    if(spr.status==="fulfilled"){
      const rows=toRows(spr.value).map((r,i)=>({
        id:String(i),
        survei:String(r["Nama Survei"]||"").trim(),
        kab:String(r["Kabupaten"]||"").trim(),
        idSampel:String(r["ID Sampel"]||"").trim(),
        nama:String(r["Nama Sampel"]||"").trim(),
        alamat:String(r["Alamat"]||"").trim(),
        status:String(r["Status"]||"").trim()==="Sudah"?"Sudah":"Belum",
        catatan:String(r["Catatan"]||"").trim(),
      })).filter(d=>d.nama||d.idSampel);
      if(rows.length>0){
        sampelData=rows;
        isDemoSampel=false;
      } else {
        // Sheet Sampel ada tapi masih kosong → pakai demo data
        sampelData=generateDemoSampel(surveiData);
        isDemoSampel=true;
      }
    } else {
      // Sheet Sampel gagal dimuat → pakai demo data sebagai fallback
      sampelData=generateDemoSampel(surveiData);
      isDemoSampel=true;
      console.warn("Sheet 'Sampel' gagal dimuat:",spr.reason?.message||spr.reason);
    }

    setDot("ok");
    const timeStr=new Date().toLocaleTimeString("id-ID");
    document.getElementById("upd").textContent=isDemoSampel?`${timeStr} · demo sampel`:timeStr;
    renderAll();
    if(kpSurvei&&kpKab)refreshKP();
  }catch(e){
    setDot("err");
    document.getElementById("upd").textContent="Gagal memuat";
    if(!surveiData.length)
      document.getElementById("cards").innerHTML=`<div class="nodata">
        <div class="ico">⚠️</div>
        <div><strong>Gagal memuat data</strong><br><small>${e.message}</small><br><br>
        <small>Cek:<br>• Spreadsheet ID sudah benar?<br>• Sharing sudah <strong>"Anyone with the link → Viewer"</strong>?<br>• Nama sheet tepat: <strong>Survei</strong> dan <strong>Sampel</strong>?</small></div>
      </div>`;
  }
}

function setDot(s){document.getElementById("dot").className=s;}
function pc(p){return p>=80?"#22c55e":p>=50?"#3b82f6":p>=20?"#f59e0b":"#ef4444";}

function renderAll(){
  document.getElementById("stT").textContent=surveiData.length;
  document.getElementById("stB").textContent=surveiData.filter(d=>d.status==="Sedang Berjalan").length;
  document.getElementById("stS").textContent=surveiData.filter(d=>d.status==="Selesai").length;
  const avg=surveiData.length?Math.round(surveiData.reduce((a,b)=>a+b.progress,0)/surveiData.length):0;
  document.getElementById("stP").textContent=avg+"%";
  renderCards();
}

function renderCards(){
  const q=document.getElementById("srch").value.toLowerCase();
  const list=surveiData.filter(d=>(flt==="Semua"||d.status===flt)&&d.nama.toLowerCase().includes(q));
  const el=document.getElementById("cards");
  if(!list.length){el.innerHTML='<div class="nodata"><div class="ico">🔍</div><div>Tidak ada survei ditemukan.</div></div>';return;}
  el.innerHTML=list.map(item=>{
    const cfg=SCFG[item.status]||SCFG["Belum Mulai"];
    const days=Math.ceil((new Date(item.deadline)-new Date())/86400000);
    const urg=days<7&&item.status!=="Selesai";
    const dlStr=item.status==="Selesai"?"✅ Selesai":days>=0?`${days} hari lagi`:"⚠️ Terlambat";
    const teams=item.penanggung.length?item.penanggung.map(p=>`<span class="tbdg">${p}</span>`).join(""):'<span style="font-size:11px;color:var(--light)">—</span>';
    const kabItems=KABKOTA.map(k=>{
      const pct=item.kab[k]??0;
      const hasSampel=sampelData.some(s=>s.survei===item.nama&&s.kab===k);
      return `<div class="kabitem" onclick="openKP('${item.id}','${esc(item.nama)}','${k}')">
        <div class="kihead"><span class="kiname">${k}</span><span class="kipct" style="color:${pc(pct)}">${pct}%</span></div>
        <div class="kibar"><div class="kifill" style="width:${pct}%;background:${pc(pct)}"></div></div>
        <div class="kihint">${hasSampel?"📋 Ada sampel — klik detail":"🔍 Klik lihat sampel"}</div>
      </div>`;
    }).join("");
    return `<div class="card" style="border-left-color:${cfg.d}">
      <div class="cmain">
        <div class="ctop">
          <div class="cinfo">
            <div class="cname">${item.nama}</div>
            <div class="cmeta">
              <span class="badge" style="background:${cfg.bg};color:${cfg.c}">● ${item.status}</span>
              <span class="dl${urg?' red':''}">📅 ${item.deadline} · ${dlStr}</span>
            </div>
          </div>
          <div class="cpct" style="color:${pc(item.progress)}">${item.progress}%</div>
        </div>
        <div class="pb"><div class="pf" style="width:${item.progress}%;background:${pc(item.progress)}"></div></div>
        <div class="team"><span class="tlbl">Tim:</span>${teams}</div>
      </div>
      <div class="kabacc">
        <button class="kabtog" onclick="togKab(this)">📍 Progress per Kabupaten/Kota <span>▾</span></button>
        <div class="kabwrap"><div class="kabgrid">${kabItems}</div></div>
      </div>
    </div>`;
  }).join("");
}
function esc(s){return s.replace(/'/g,"\\'");}

function togKab(btn){const w=btn.nextElementSibling;w.classList.toggle("open");btn.querySelector("span").textContent=w.classList.contains("open")?"▴":"▾";}

document.getElementById("ftrs").onclick=e=>{
  if(!e.target.dataset.f)return;
  flt=e.target.dataset.f;
  document.querySelectorAll(".fb").forEach(b=>b.classList.toggle("on",b.dataset.f===flt));
  renderCards();
};

function openKP(sid,sname,kab){
  kpSurvei=sid;kpKab=kab;sflt="Semua";
  document.getElementById("kpS").textContent=sname;
  document.getElementById("kpK").textContent=kab;
  document.getElementById("ksrch").value="";
  document.querySelectorAll(".kfb").forEach(b=>b.classList.toggle("on",b.dataset.sf==="Semua"));
  refreshKP();
  document.getElementById("kPan").classList.add("on");
  document.getElementById("kOv").classList.add("on");
}
function closeKP(){document.getElementById("kPan").classList.remove("on");document.getElementById("kOv").classList.remove("on");}
function setSF(f,btn){sflt=f;document.querySelectorAll(".kfb").forEach(b=>b.classList.toggle("on",b.dataset.sf===f));renderSampel();}

function refreshKP(){
  const survei=surveiData.find(d=>d.id===kpSurvei);
  if(survei){const p=survei.kab[kpKab]??0;setKPBar(p);}
  const sname=document.getElementById("kpS").textContent;
  kpItems=sampelData.filter(s=>s.survei===sname&&s.kab===kpKab);
  const tot=kpItems.length,sdh=kpItems.filter(s=>s.status==="Sudah").length;
  document.getElementById("kpTot").textContent=tot;
  document.getElementById("kpSdh").textContent=sdh;
  document.getElementById("kpBlm").textContent=tot-sdh;
  if(tot>0)setKPBar(Math.round(sdh/tot*100));
  renderSampel();
}
function setKPBar(p){
  document.getElementById("kpF").style.cssText=`width:${p}%;background:${pc(p)}`;
  document.getElementById("kpP").style.color=pc(p);
  document.getElementById("kpP").textContent=p+"%";
}

function renderSampel(){
  const q=document.getElementById("ksrch").value.toLowerCase();
  const filtered=kpItems.filter(s=>(sflt==="Semua"||s.status===sflt)&&(s.nama+s.idSampel+s.alamat).toLowerCase().includes(q));
  const el=document.getElementById("kbody");
  if(!kpItems.length){
    const demoNote=isDemoSampel?`<small style="color:var(--light);margin-top:6px;display:block">⚠️ Mode demo — tambahkan data di sheet "Sampel" di Google Sheets.</small>`:`<small style="color:var(--light);margin-top:6px;display:block">Tambahkan di sheet "Sampel" di Google Sheets.</small>`;
    el.innerHTML=`<div class="kempty"><div class="ei">📋</div>Belum ada data sampel untuk wilayah ini.${demoNote}</div>`;
    return;
  }
  if(!filtered.length){el.innerHTML='<div class="kempty"><div class="ei">🔍</div>Tidak ada yang cocok.</div>';return;}
  el.innerHTML=filtered.map(s=>`
    <div class="sitem ${s.status==="Sudah"?"sudah":"belum"}">
      <div class="sdot ${s.status==="Sudah"?"sudah":"belum"}">${s.status==="Sudah"?"✓":"○"}</div>
      <div class="sbody">
        <div class="srow">
          <div><span class="sname">${s.nama||"(tanpa nama)"}</span>${s.idSampel?`<span class="sid">${s.idSampel}</span>`:""}</div>
          <span class="sbdg ${s.status==="Sudah"?"sudah":"belum"}">${s.status==="Sudah"?"✅ Sudah":"⏳ Belum"}</span>
        </div>
        ${s.alamat?`<div class="smeta">📍 ${s.alamat}</div>`:""}
        ${s.catatan?`<div class="snote">💬 ${s.catatan}</div>`:""}
      </div>
    </div>`).join("");
}

function openSP(){document.getElementById("span").classList.add("on");document.getElementById("sov").classList.add("on");}
function closeSP(){document.getElementById("span").classList.remove("on");document.getElementById("sov").classList.remove("on");}
function setTheme(t,btn){document.documentElement.setAttribute("data-theme",t);document.querySelectorAll(".tbtn").forEach(b=>b.classList.remove("on"));btn.classList.add("on");}
function setFZ(v){document.documentElement.style.setProperty("--fs",v+"px");document.getElementById("fzv").textContent=v+"px";}
</script>
